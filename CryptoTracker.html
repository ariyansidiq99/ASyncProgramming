<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CryptoTracker.css">
</head>
<body>
    <h1>Crypto Tracker</h1>
    <div class="summary" id="summary"></div>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Coint</th>
                <th>Price (USD)</th>
                <th>24h Change</th>
                <th>Market Cap</th>
            </tr>
        </thead>
        <tbody id="cryptoTable">
            <tr>
                <td colspan="5" class="loading">Fetching Live prices...</td>
            </tr>
        </tbody>
    </table>
    <div class="refresh-info">Auto-refresh every 30 seconds</div>
    <script src="CryptoTracker.js"></script>
</body>
</html>
